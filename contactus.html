<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Best Electronics Website</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <!-- Header content (e.g., logo, navigation) -->
    </header>

    <section id="contact-us">
        <h2>Contact Us</h2>
        <div class="contact-container">
          <div class="contact-info">
            <h3>Get in Touch</h3>
            <p><i class="fas fa-envelope"></i> Email: info@example.com</p>
            <p><i class="fas fa-phone"></i> Phone: +1 (555) 123-4567</p>
            <p><i class="fas fa-map-marker-alt"></i> Address: 123 Main Street, City, State, Zip Code</p>
            <div class="social-links">
              <a href="#"><i class="fab fa-facebook">FACEBOOK</i></a>
              <a href="#"><i class="fab fa-twitter">X</i></a>
              <a href="#"><i class="fab fa-instagram">Instagram</i></a>
              <a href="#"><i class="fab fa-linkedin"></i>LinkedIn</a>
            </div>
          </div>
          <div class="contact-form">
            <h3>Send a Message</h3>
            <form>
              <input type="text" placeholder="Name" required>
              <input type="email" placeholder="Email" required>
              <textarea placeholder="Message" required></textarea>
              <button type="submit">Submit</button>
            </form>
          </div>
        </div>
      </section>
    <footer>
        <!-- Footer content -->
    </footer>

    <script src="script.js"></script>
</body>
</html>
